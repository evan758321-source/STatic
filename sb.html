<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scary Baboon - N5 External</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: #2b2b2b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }

  .cursor {
    position: fixed;
    top: 0; left: 0;
    width: 28px;
    height: 44px;
    pointer-events: none;
    z-index: 9999;
  }

  .cursor svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8));
  }

  .imgui-win {
    width: 280px;
    background: #1e1e2a;
    border: 1px solid #444466;
    border-radius: 3px;
    box-shadow: 2px 4px 20px rgba(0,0,0,0.8);
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .title-bar {
    background: linear-gradient(180deg, #3d3d5c 0%, #2e2e45 100%);
    border-bottom: 1px solid #555580;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: none;
  }

  .title-text {
    font-size: 11px;
    font-weight: 600;
    color: #dde0ff;
    letter-spacing: 0.02em;
  }

  .close-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 14px;
    line-height: 1;
    cursor: none;
  }

  .content {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .login-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ec94e;
    box-shadow: 0 0 6px #4ec94e;
    flex-shrink: 0;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
  }

  .login-text { font-size: 11px; color: #888aaa; }
  .login-name { font-size: 11px; font-weight: 700; color: #4ec94e; }

  .sep {
    height: 1px;
    background: #2e2e44;
  }

  .field-label {
    font-size: 10px;
    color: #666880;
    margin-bottom: 3px;
  }

  .imgui-input {
    width: 100%;
    background: #13131c;
    border: 1px solid #3a3a58;
    border-radius: 2px;
    color: #c8caff;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    cursor: none;
  }

  .imgui-input:focus {
    border-color: #6674f4;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: none;
  }

  .imgui-checkbox {
    width: 15px; height: 15px;
    background: #13131c;
    border: 1px solid #4a4a6a;
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, border-color 0.1s;
  }

  .imgui-checkbox.checked {
    background: #6674f4;
    border-color: #6674f4;
  }

  .imgui-checkbox.checked::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .checkbox-label {
    font-size: 11px;
    color: #c8caff;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor">
  <svg viewBox="0 0 12 20" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,0 0,16 3.5,12.5 6,18 7.5,17.3 5,11.5 9.5,11.5"
      fill="white" stroke="black" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>
</div>

<div class="imgui-win" id="win">
  <div class="title-bar" id="titleBar">
    <span class="title-text">Scary Baboon - N5 External</span>
    <button class="close-btn">x</button>
  </div>

  <div class="content">

    <div class="login-row">
      <div class="dot"></div>
      <span class="login-text">Logged in as</span>
      <span class="login-name">N5.tuff</span>
    </div>

    <div class="sep"></div>

    <div>
      <div class="field-label">item_ID</div>
      <input class="imgui-input" type="text" value="Boombox">
    </div>

    <div class="checkbox-row" onclick="this.querySelector('.imgui-checkbox').classList.toggle('checked')">
      <div class="imgui-checkbox"></div>
      <span class="checkbox-label">Spam Spawn</span>
    </div>

  </div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  const win = document.getElementById('win');
  const bar = document.getElementById('titleBar');
  let dragging = false, ox = 0, oy = 0;

  bar.addEventListener('mousedown', e => {
    dragging = true;
    const r = win.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    win.style.transform = 'none';
    win.style.top = r.top + 'px';
    win.style.left = r.left + 'px';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = (e.clientX - ox) + 'px';
    win.style.top  = (e.clientY - oy) + 'px';
  });

  document.addEventListener('mouseup', () => dragging = false);
</script>
</body>
</html>
